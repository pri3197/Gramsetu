# Render Blueprint Specification for GramSetu Deployment
services:
  # 1. Python AI and Data Fetcher Service
  - type: web
    name: gramsetu-python
    env: docker
    dockerContext: service-python
    dockerfilePath: Dockerfile
    plan: free
    numInstances: 1
    # Expose internally or publicly

  # 2. Java Spring Boot Web Service
  - type: web
    name: gramsetu-backend
    env: docker
    dockerContext: backend-java
    dockerfilePath: Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PYTHON_SERVICE_URL
        value: https://gramsetu-python.onrender.com
      # Dynamic profile overrides can go here if using PostgreSQL
