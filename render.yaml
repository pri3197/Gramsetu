# Render Blueprint Specification for GramSetu Deployment
services:
  # 1. Python AI and Data Fetcher Service
  - type: web
    name: gramsetu-python
    env: docker
    dockerContext: service-python
    dockerfilePath: service-python/Dockerfile
    plan: free
    numInstances: 1
    # Expose internally or publicly

  # 2. Java Spring Boot Web Service
  - type: web
    name: gramsetu-backend
    env: docker
    dockerContext: backend-java
    dockerfilePath: backend-java/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PYTHON_SERVICE_URL
        value: http://gramsetu-python:8000
      - key: SPRING_DATASOURCE_URL
        sync: false   # Set manually in Render dashboard (Supabase Postgres URL)
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: CORS_ALLOWED_ORIGINS
        value: https://gramsetu-eight.vercel.app,https://gramsetu.vercel.app,http://localhost:3000,http://localhost:8081
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
