# Render Blueprint Specification for GramSetu Deployment
services:
  # 1. Python AI and Data Fetcher Service
  - type: web
    name: gramsetu-python
    env: docker
    dockerContext: service-python
    dockerfilePath: service-python/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: AGMARKNET_BASE_URL
        value: http://gramsetu-agmarknet:5000
      - key: NADRES_DATASET_ACCESS_KEY
        value: 5489aebddf706f827b4e8cc16a34490b626b71b3d56aa8069c1f3b885eb927f9
      - key: NEWS_API_KEY
        value: 469db6fc98f74c8cb2e0dc7911cedc83

  # 2. Agmarknet API Bridge Service
  - type: web
    name: gramsetu-agmarknet
    env: docker
    dockerContext: agmarknet_api
    dockerfilePath: agmarknet_api/Dockerfile
    plan: free
    numInstances: 1

  # 3. Java Spring Boot Web Service
  - type: web
    name: gramsetu-backend
    env: docker
    dockerContext: backend-java
    dockerfilePath: backend-java/Dockerfile
    plan: free
    numInstances: 1
    envVars:
      - key: PYTHON_SERVICE_URL
        value: http://gramsetu-python:8000
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-0-eu-west-1.pooler.supabase.com:6543/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.vthgfbhkqjrhzofdwwuz
      - key: SPRING_DATASOURCE_PASSWORD
        value: HPCPtDnqF581Soek
      - key: SPRING_DATASOURCE_DRIVER_CLASS_NAME
        value: org.postgresql.Driver
      - key: CORS_ALLOWED_ORIGINS
        value: https://gramsetu-eight.vercel.app,https://gramsetu.vercel.app,http://localhost:3000,http://localhost:8081
      - key: SPRING_JPA_DATABASE_PLATFORM
        value: org.hibernate.dialect.PostgreSQLDialect
