# General Application Configuration
spring.application.name=gramsetu-backend
server.port=8081

# Profile-based database configuration
# Default: Use local in-memory H2 database, override with Postgres/Supabase via env variables
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/gramsetudb;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate JPA Settings
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# External service configurations
# GramSetu Python AI & Data service base URL
# Default: http://localhost:8000 (running locally)
gramsetu.python.service.url=${PYTHON_SERVICE_URL:http://127.0.0.1:8000}

# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.com.gramsetu=INFO

# Enable scheduler tasks
spring.task.scheduling.pool.size=2

# CORS Configuration: Set to Vercel domain in production
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8081}
