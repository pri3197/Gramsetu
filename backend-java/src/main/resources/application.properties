# General Application Configuration
spring.application.name=gramsetu-backend
server.port=8080

# Profile-based database configuration
# Default: Use local in-memory H2 database
spring.datasource.url=jdbc:h2:mem:gramsetudb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Hibernate JPA Settings
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# External service configurations
# GramSetu Python AI & Data service base URL
# Default: http://localhost:8000 (running locally)
gramsetu.python.service.url=http://127.0.0.1:8000

# Logging Configurations
logging.level.org.springframework.web=INFO
logging.level.com.gramsetu=INFO

# Enable scheduler tasks
spring.task.scheduling.pool.size=2
